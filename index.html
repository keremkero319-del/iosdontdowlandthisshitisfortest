<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Güncelleme Servisi</title>
    <style>
        body {
            background-color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h2 { color: #1c1c1e; margin-bottom: 10px; }
        p { color: #8e8e93; margin-bottom: 30px; }
        .btn {
            background-color: #007aff;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:active { background-color: #0051a8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sistem Yönetimi</h2>
        <p>WhatsApp kısıtlamasını aktif etmek için konfigürasyon profilini yükleyin.</p>
        <a href="whatsapp_iptal.mobileconfig" class="btn">Profili Yükle</a>
    </div>
</body>
</html>
